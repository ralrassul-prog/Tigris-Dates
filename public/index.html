<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tigris Dates Ordering</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="background-glow"></div>

    <main class="layout">
      <header class="hero card compact-hero">
        <div class="hero-admin-link">
          <a class="btn ghost btn-admin-entry" href="/admin.html">Admin</a>
        </div>
        <p class="kicker">Fresh Medjool Dates</p>
        <h1>Tigris Dates</h1>
        <p class="subbrand">Organic Medjool Dates</p>
      </header>

      <section id="appCard" class="card app-card">
        <form id="orderForm" class="stacked-form">
          <div class="field-grid">
            <label>
              Full name
              <input id="customerNameInput" type="text" autocomplete="name" required />
            </label>
          </div>

          <h3>Choose your boxes</h3>
          <div id="productGrid" class="product-grid"></div>

          <div class="field-grid">
            <label>
              Phone number
              <input id="phoneInput" type="tel" required />
            </label>
          </div>

          <textarea id="notesInput" rows="1" placeholder="Optional note (pickup time, preferences)"></textarea>

          <fieldset class="payment-box">
            <legend>Pay</legend>
            <label class="payment-option">
              <input type="radio" name="paymentMethod" value="card" checked />
              Card now
            </label>
            <label class="payment-option">
              <input type="radio" name="paymentMethod" value="zelle" />
              Zelle (pay later)
            </label>
            <label class="payment-option">
              <input type="radio" name="paymentMethod" value="cash" />
              Cash
            </label>
            <p id="zelleHint" class="hint hidden"></p>
          </fieldset>

          <div class="summary-row checkout-row">
            <p id="orderTotal">Total: $0.00</p>
            <button class="btn primary" type="submit">Place Order</button>
          </div>
          <p class="trust-line">Secure checkout. No account needed.</p>

          <p id="orderMessage" class="message"></p>
          <a id="whatsappLink" class="btn whatsapp hidden" target="_blank" rel="noreferrer">
            Send Order via WhatsApp
          </a>
        </form>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
