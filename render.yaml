services:
  - type: web
    name: tigris-dates-app
    runtime: node
    plan: starter
    region: oregon
    rootDir: .
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/products
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: BASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SESSION_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_CURRENCY
        value: usd
      - key: WHATSAPP_BUSINESS_NUMBER
        sync: false
      - key: ZELLE_PAYEE
        sync: false
    disks:
      - name: tigris-dates-data
        mountPath: /opt/render/project/src/data
        sizeGB: 1
